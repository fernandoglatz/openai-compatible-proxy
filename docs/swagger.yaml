basePath: /
definitions:
  request.OllamaShowRequest:
    properties:
      model:
        type: string
    required:
    - model
    type: object
  response.Details:
    properties:
      families:
        items:
          type: string
        type: array
      family:
        type: string
      format:
        type: string
      parameter_size:
        type: string
      quantization_level:
        type: string
    type: object
  response.LMStudioListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/response.LMStudioModel'
        type: array
      object:
        type: string
    type: object
  response.LMStudioModel:
    properties:
      arch:
        type: string
      compatibility_type:
        type: string
      id:
        type: string
      max_context_length:
        type: integer
      object:
        type: string
      publisher:
        type: string
      quantization:
        type: string
      state:
        type: string
      type:
        type: string
    type: object
  response.LMStudioV1Capabilities:
    properties:
      trained_for_tool_use:
        type: boolean
      vision:
        type: boolean
    type: object
  response.LMStudioV1ListResponse:
    properties:
      models:
        items:
          $ref: '#/definitions/response.LMStudioV1Model'
        type: array
    type: object
  response.LMStudioV1LoadedInstance:
    properties:
      id:
        type: string
    type: object
  response.LMStudioV1Model:
    properties:
      architecture:
        type: string
      capabilities:
        $ref: '#/definitions/response.LMStudioV1Capabilities'
      display_name:
        type: string
      format:
        type: string
      key:
        type: string
      loaded_instances:
        items:
          $ref: '#/definitions/response.LMStudioV1LoadedInstance'
        type: array
      max_context_length:
        type: integer
      params_string:
        type: string
      publisher:
        type: string
      quantization:
        $ref: '#/definitions/response.LMStudioV1Quantization'
      size_bytes:
        type: integer
      type:
        type: string
    type: object
  response.LMStudioV1Quantization:
    properties:
      name:
        type: string
    type: object
  response.OllamaModel:
    properties:
      capabilities:
        items:
          type: string
        type: array
      details:
        $ref: '#/definitions/response.Details'
      digest:
        type: string
      model:
        type: string
      model_info:
        additionalProperties:
          type: string
        type: object
      modified_at:
        type: string
      name:
        type: string
      size:
        type: integer
    type: object
  response.OllamaResponse:
    properties:
      models:
        items:
          $ref: '#/definitions/response.OllamaModel'
        type: array
    type: object
  response.OllamaVersionResponse:
    properties:
      version:
        type: string
    type: object
  response.OpenAIListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/response.OpenAIModel'
        type: array
      object:
        type: string
    type: object
  response.OpenAIModel:
    properties:
      created:
        type: integer
      id:
        type: string
      object:
        type: string
      owned_by:
        type: string
    type: object
info:
  contact: {}
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: openai-compatible-proxy
  version: "1.0"
paths:
  /api/show:
    post:
      consumes:
      - application/json
      parameters:
      - description: Model name
        in: body
        name: model
        required: true
        schema:
          $ref: '#/definitions/request.OllamaShowRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OllamaModel'
      summary: Get details of a specific model by name
      tags:
      - ollama
  /api/tags:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OllamaResponse'
      summary: Get tags from models
      tags:
      - ollama
  /api/v0/models:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.LMStudioListResponse'
      summary: List available models
      tags:
      - lm-studio
  /api/v0/models/{model}:
    get:
      parameters:
      - description: Model ID
        in: path
        name: model
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.LMStudioModel'
      summary: Get details of a specific model by ID
      tags:
      - lm-studio
  /api/v1/models:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.LMStudioV1ListResponse'
      summary: List available models (native v1 API)
      tags:
      - lm-studio
  /api/version:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OllamaVersionResponse'
      summary: Get version information
      tags:
      - ollama
  /health:
    get:
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get health
      tags:
      - health
  /v1/models:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OpenAIListResponse'
      summary: List available models
      tags:
      - openai
securityDefinitions:
  Bearer:
    description: Generated by /authentication
    in: header
    name: X-AUTHORIZATION
    type: apiKey
swagger: "2.0"
