basePath: /
definitions:
  request.OllamaShowRequest:
    properties:
      model:
        type: string
    required:
    - model
    type: object
  response.Details:
    properties:
      families:
        items:
          type: string
        type: array
      family:
        type: string
      format:
        type: string
      parameter_size:
        type: string
      parent_model:
        type: string
      quantization_level:
        type: string
    type: object
  response.OllamaModel:
    properties:
      capabilities:
        items:
          type: string
        type: array
      details:
        $ref: '#/definitions/response.Details'
      digest:
        type: string
      model:
        type: string
      model_info:
        additionalProperties:
          type: string
        type: object
      modified_at:
        type: string
      name:
        type: string
      size:
        type: integer
    type: object
  response.OllamaResponse:
    properties:
      models:
        items:
          $ref: '#/definitions/response.OllamaModel'
        type: array
    type: object
  response.OllamaVersionResponse:
    properties:
      version:
        type: string
    type: object
info:
  contact: {}
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: openai-compatible-proxy
  version: "1.0"
paths:
  /api/show:
    post:
      consumes:
      - application/json
      parameters:
      - description: Model name
        in: body
        name: model
        required: true
        schema:
          $ref: '#/definitions/request.OllamaShowRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OllamaModel'
      summary: Get details of a specific model by name
      tags:
      - ollama
  /api/tags:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OllamaResponse'
      summary: Get tags from models
      tags:
      - ollama
  /api/version:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.OllamaVersionResponse'
      summary: Get version information
      tags:
      - ollama
  /health:
    get:
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Get health
      tags:
      - health
securityDefinitions:
  BasicAuth:
    type: basic
  Bearer:
    description: Generated by /authentication
    in: header
    name: X-AUTHORIZATION
    type: apiKey
swagger: "2.0"
