server:
  listening: "0.0.0.0:8080"
  context-path: "/"

data:
  mongo:
    uri: "mongodb://mongo:27017"
    database: "openai-compatible-proxy"

  redis:
    address: "redis:6379"
    password: ""
    db: 0
    ttl:
      model: 24h

lm-studio:
  url: "http://127.0.0.1:11434"
  timeout: 600s
  wol:
    enabled: true
    mac-address: "00:00:00:00:00:00"
    broadcast-address: "255.255.255.255:9"
    max-retries: 10
    retry-wait: 5s

log:
  level: TRACE
  format: TEXT
  colored: true
