server:
  listening: "0.0.0.0:8080"
  context-path: "/"

data:
  sqlite:
    path: "data/openai-compatible-proxy.db"

openai:
  api-keys: []

lm-studio:
  url: "http://localhost:1234"
  api-key: "lmstudio"
  timeout: 600s
  wol:
    enabled: true
    mac-address: "00:00:00:00:00:00"
    broadcast-address: "255.255.255.255:9"
    max-retries: 10
    retry-wait: 5s

log:
  level: TRACE
  format: TEXT
  colored: true

scheduler:
  enabled: true               # false = forward with no scheduling (today's behavior)
  max-concurrent: 1           # reserved; only 1 (serialize) is currently supported
  idle-timeout: 10s           # grace window before switching to a waiting session
  heartbeat-after: 15s        # silence tolerated before keep-alive pings start (0 = ping immediately)
  heartbeat-interval: 10s     # gap between pings; keep below the shortest proxy/CDN
                              # response timeout in front of this service
                              # (CloudFront defaults to 30s). 0 disables heartbeats.
  gated-paths:                # suffix match; covers both /v1/* and /api/v1/*
    - /v1/chat/completions
    - /v1/completions
    - /v1/responses
