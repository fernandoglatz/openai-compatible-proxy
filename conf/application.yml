server:
  listening: "0.0.0.0:8080"
  context-path: "/"

data:
  mongo:
    uri: "mongodb://mongo:27017"
    database: "openai-compatible-proxy"

openai:
  api-keys: []

lm-studio:
  url: "http://localhost:1234"
  api-key: "lmstudio"
  timeout: 600s
  wol:
    enabled: true
    mac-address: "00:00:00:00:00:00"
    broadcast-address: "255.255.255.255:9"
    max-retries: 10
    retry-wait: 5s

log:
  level: TRACE
  format: TEXT
  colored: true
